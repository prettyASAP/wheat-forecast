# Napi élő előrejelzés: lefuttatja a predict_live.py-t, commitolja a friss
# forecast.json-t és a history snapshotot, majd deployolja a web/ mappát
# GitHub Pages-re. Kézzel is indítható (workflow_dispatch).
name: daily-forecast

on:
  schedule:
    - cron: "30 4 * * *"   # minden nap 04:30 UTC (06:30 Budapest, nyáron)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Függőségek
        run: pip install -r requirements.txt

      - name: Élő előrejelzés futtatása (mindhárom termény)
        run: |
          python -m src.predict_live --crop wheat
          python -m src.predict_live --crop corn
          python -m src.predict_live --crop barley

      - name: Friss forecast commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/forecast_*.json web/data/history/
          if git diff --cached --quiet; then
            echo "Nincs változás, nincs commit."
          else
            git commit -m "napi forecast frissítés ($(date -u +%F))"
            git push
          fi

      - name: Pages artifact feltöltése
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: forecast
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages-re
        id: deployment
        uses: actions/deploy-pages@v4

# Napi élő előrejelzés: lefuttatja a predict_live.py-t, commitolja a friss
# forecast.json-t és a history snapshotot, majd deployolja a web/ mappát
# GitHub Pages-re. Kézzel is indítható (workflow_dispatch).
name: daily-forecast

on:
  schedule:
    - cron: "30 4 * * *"   # minden nap 04:30 UTC (06:30 Budapest, nyáron)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    # Minden `run:` blokk hibára álljon meg és a pipe-hibák se nyelődjenek el.
    # (A GitHub Actions alapértelmezése is -eo pipefail, de itt explicit rögzítjük,
    #  hogy egy jövőbeli shell-váltás se csendesítse el a hibákat.)
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Függőségek
        run: |
          set -euo pipefail
          pip install -r requirements.txt

      # Gyors védőháló (~1 mp): a dátum/ablak/kalibráció-magra írt tesztek.
      # Ha ezek buknak, az élő előrejelzés el sem indul — nem publikálunk
      # hibás logikával számolt forecastot.
      - name: Tesztek (megbízhatósági öv)
        run: |
          set -euo pipefail
          python -m pytest tests/ -q

      - name: Élő előrejelzés futtatása (mindhárom termény)
        run: |
          set -euo pipefail
          python -m src.predict_live --crop wheat
          python -m src.predict_live --crop corn
          python -m src.predict_live --crop barley

      - name: Napi PDF-jelentés generálása
        run: |
          set -euo pipefail
          python -m src.report_pdf

      - name: Friss forecast commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/forecast_*.json web/data/history/ \
                  web/data/jelentes/ web/data/jelentes_latest.pdf
          if git diff --cached --quiet; then
            echo "Nincs változás, nincs commit."
          else
            git commit -m "napi forecast frissítés ($(date -u +%F))"
            # ha közben más commit került a main-re, rebase-elünk push előtt
            git pull --rebase origin main
            git push
          fi

      # Hibánál látható, összefoglalt üzenet a job-summary lapon (nem nyelődik el).
      # A `if: failure()` miatt csak akkor fut, ha valamelyik előző lépés elhasalt;
      # a záró `exit 1` megtartja a job piros (bukott) státuszát.
      - name: Hiba jelzése (job summary)
        if: failure()
        run: |
          {
            echo "## ❌ Napi előrejelzés HIBA ($(date -u +'%F %T UTC'))"
            echo ""
            echo "A(z) \`daily-forecast\` job egy lépése hibára futott — a forecast"
            echo "NEM frissült. Nézd meg a fenti lépések logját."
            echo ""
            echo "Gyakori okok: adatforrás (KSH/Open-Meteo) kimaradás, fázis-záró"
            echo "ellenőrzés (predict_live sys.exit), push-ütközés."
          } >> "$GITHUB_STEP_SUMMARY"
          # RIASZTÁS-INTEGRÁCIÓ HELYE (külső titok nélkül most nincs bekötve):
          # Slack/e-mail webhookot ide tehetsz, pl.:
          #   curl -fsS -X POST -H 'Content-type: application/json' \
          #     --data '{"text":"daily-forecast bukott: '"$GITHUB_RUN_ID"'"}' \
          #     "$SLACK_WEBHOOK_URL"
          # a $SLACK_WEBHOOK_URL-t repo secretként kell felvenni (Settings > Secrets).
          exit 1

      - name: Pages artifact feltöltése
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: forecast
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages-re
        id: deployment
        uses: actions/deploy-pages@v4

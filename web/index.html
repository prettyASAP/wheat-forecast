<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terméshozam-előrejelző — Magyarország</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <header>
    <h1>Terméshozam-előrejelző</h1>
    <div id="crop-switch" role="tablist">
      <button data-crop="wheat" class="active" role="tab">Búza</button>
      <button data-crop="corn" role="tab">Kukorica</button>
      <button data-crop="barley" role="tab">Őszi árpa</button>
    </div>
    <select id="layer-select" aria-label="Térképréteg">
      <option value="anomaly" selected>Hozam-anomália</option>
      <option value="wb">Vízmérleg (mm)</option>
      <option value="prec">Csapadék (mm)</option>
      <option value="heat">Hőstressznapok</option>
      <option value="gdd">Hőösszeg (GDD)</option>
    </select>
    <a id="table-link" href="tabla.html">Táblázat ↗</a>
    <div id="meta">betöltés…</div>
  </header>
  <div id="national"></div>

  <main>
    <div id="map"></div>

    <aside id="panel" class="hidden">
      <button id="panel-close" aria-label="Bezárás">×</button>
      <h2 id="panel-name"></h2>
      <div id="panel-body"></div>
    </aside>
  </main>

  <div id="timeline" class="hidden">
    <label for="slider">Előrejelzés alakulása:</label>
    <input type="range" id="slider" min="0" max="0" value="0" aria-label="Előrejelzés-idővonal">
    <span id="slider-date"></span>
  </div>

  <div id="legend">
    <span id="legend-min">−20%</span>
    <div id="legend-bar"></div>
    <span id="legend-max">+20%</span>
    <span class="legend-note" id="legend-note">anomália a trendhez képest</span>
  </div>

  <footer>
    Adatok: <a href="https://open-meteo.com/">Open-Meteo</a> (ERA5, CC BY 4.0) ·
    <a href="https://www.ksh.hu/stadat_files/mez/hu/mez0071.html">KSH</a> (vármegyei búza-termésátlag) ·
    <a href="https://ec.europa.eu/eurostat/web/gisco">Eurostat GISCO</a> (NUTS3 határok, © EuroGeographics) ·
    <a href="https://ec.europa.eu/eurostat/databrowser/view/apri_ap_crpouta/">Eurostat</a> (termelői árak).
    A becslés statisztikai modell, nem hivatalos adat.
  </footer>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
